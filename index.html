<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Image Generator</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

textarea{
width:80%;
padding:15px;
margin:10px;
background:#111827;
color:white;
border:none;
}

button{
padding:15px 30px;
background:#4f46e5;
color:white;
border:none;
cursor:pointer;
}

img{
width:80%;
margin-top:20px;
border-radius:10px;
}
</style>

</head>
<body>

<h1>AI Image Generator</h1>

<textarea id="prompt" placeholder="Describe image..."></textarea>
<br>
<button onclick="generate()">Generate</button>

<div id="result"></div>

<script>
function generate(){

const prompt = document.getElementById("prompt").value

const seed = Math.floor(Math.random()*1000000)

const url =
"https://image.pollinations.ai/prompt/"
+ encodeURIComponent(prompt)
+ "?seed="+seed+"&width=1024&height=1024&model=flux"

document.getElementById("result").innerHTML =
"<img src='"+url+"'>"

}
</script>

</body>
</html>
